name: Weekly Inventory Sync
on:
  schedule:
    - cron: "1 5 * * 5"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pull latest inventory
        env:
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}
        run: python sync_inventory.py
      - name: Commit if changed
        run: |
          git config user.name "inventory-bot"
          git config user.email "bot@users.noreply.github.com"
          git add inventory.json
          git diff --cached --quiet || git commit -m "Weekly inventory sync $(date -u +%F)"
          git push
